name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install readline
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev

      - name: Build
        run: make

      - name: Verify binary
        run: |
          test -x ./minishell
          file ./minishell

      - name: Clean
        run: make fclean
